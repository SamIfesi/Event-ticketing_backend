<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="preload"
      href="/public/fonts/Fractul-Regular.woff2"
      type="font/woff2"
      as="font"
      crossorigin
    />
    <link
      rel="preload"
      href="/public/fonts/Fractul-SemiBold.woff2"
      type="font/woff2"
      as="font"
      crossorigin
    />
    <link
      rel="preload"
      href="/public/fonts/Fractul-Bold.woff2"
      type="font/woff2"
      as="font"
      crossorigin
    />
    <title>Ticket #{{TICKET_ID}}</title>
    <style>
      {{TAILWIND_CSS}}
    </style>
  </head>
  <body
    class="bg-pdf-bg flex justify-center items-center min-h-screen  px-4 print:[print-color-adjust:exact] print:[-webkit-print-color-adjust:exact]"
  >
    <div class="w-105 bg-white overflow-visible relative">
      <!-- Hero -->
      <div class="rounded-t-3xl px-6 pt-9 pb-7 text-center">
        <div class="text-xl leading-none mb-3">🎉</div>
        <div class="text-lg font-bold text-pdf-text mb-1.5 tracking-tight">
          Your ticket is ready!
        </div>
        <div class="text-sm text-pdf-muted">{{EVENT_TITLE}}</div>
      </div>

      <!-- Top perforation -->
      <div class="relative h-0 flex items-center overflow-visible z-2 m-0">
        <div class="w-6 h-6 rounded-full bg-pdf-bg shrink-0 -ml-3"></div>
        <div
          class="flex-1 border-t-2 border-dashed border-pdf-perf mx-1.5"
        ></div>
        <div class="w-6 h-6 rounded-full bg-pdf-bg shrink-0 -mr-3"></div>
      </div>

      <!-- Body fields -->
      <div class="px-6 pt-7 pb-0">
        <!-- Ticket ID + Amount -->
        <div class="grid grid-cols-2 mb-3">
          <div>
            <div
              class="text-[7px] font-semibold text-pdf-muted uppercase tracking-widest mb-1"
            >
              Ticket ID
            </div>
            <div class="text-[9px] font-bold text-pdf-text leading-snug">
              #{{TICKET_ID}}
            </div>
          </div>
          <div class="text-right">
            <div
              class="text-[7px] font-semibold text-pdf-muted uppercase tracking-widest mb-1"
            >
              Amount
            </div>
            <div class="text-[9px] font-bold text-pdf-text leading-snug">
              {{AMOUNT}}
            </div>
          </div>
        </div>

        <!-- Date & Time + Venue -->
        <div class="grid grid-cols-2 mb-3">
          <div>
            <div
              class="text-[7px] font-semibold text-pdf-muted uppercase tracking-widest mb-1"
            >
              Date &amp; Time
            </div>
            <div class="text-[9px] font-bold text-pdf-text leading-snug">
              {{DATE_TIME}}
            </div>
          </div>
          <div class="text-right">
            <div
              class="text-[7px] font-semibold text-pdf-muted uppercase tracking-widest mb-1"
            >
              Venue
            </div>
            <div class="text-[9px] font-bold text-pdf-text leading-snug">
              {{VENUE}}
            </div>
          </div>
        </div>

        <!-- Ticket Type + Holder -->
        <div class="grid grid-cols-2 mb-3">
          <div>
            <div
              class="text-[7px] font-semibold text-pdf-muted uppercase tracking-widest mb-1"
            >
              Ticket Type
            </div>
            <div class="text-[9px] font-bold text-pdf-text leading-snug">
              {{TICKET_TYPE}}
            </div>
          </div>
          <div class="text-right">
            <div
              class="text-[7px] font-semibold text-pdf-muted uppercase tracking-widest mb-1"
            >
              Holder
            </div>
            <div class="text-[9px] font-bold text-pdf-text leading-snug">
              {{HOLDER_NAME}}
            </div>
          </div>
        </div>

      </div>

      <!-- Bottom perforation -->
      <div class="relative h-0 flex items-center overflow-visible z-2 m-0">
        <div class="w-6 h-6 rounded-full bg-pdf-bg shrink-0 -ml-3"></div>
        <div
          class="flex-1 border-t-2 border-dashed border-pdf-perf mx-1.5"
        ></div>
        <div class="w-6 h-6 rounded-full bg-pdf-bg shrink-0 -mr-3"></div>
      </div>

      <!-- QR Section -->
      <div class="px-6 pt-1 pb-7 text-center">
        <div
          class="text-[7px] font-semibold text-pdf-muted uppercase tracking-widest mb-3 mt-2.5"
        >
          Scan at the gate
        </div>

        <div
          class="w-30 h-30 mx-auto mb-3 border border-slate-200 rounded-xl overflow-hidden bg-slate-50 flex items-center justify-center"
        >
          {{QR_HTML}}
        </div>

        <div
          class="inline-flex items-center gap-2 bg-slate-100 border border-slate-200 rounded-full px-2 py-2 mb-3"
        >
          {{STATUS_DOT}}
          <span class="text-[7.5px] text-slate-500">{{STATUS_LABEL}}</span>
        </div>

        <div class="text-[7px] text-muted mb-3">Issued by</div>

        <div class="">{{LOGO}}</div>
      </div>
    </div>
  </body>
</html>
